<div class="container">
  <h1>CRUD con CrudCrud – PUT y DELETE</h1>

  <div class="form">
    <input [(ngModel)]="newPost.title" placeholder="Título" required />
    <textarea [(ngModel)]="newPost.content" placeholder="Contenido..." rows="4"></textarea>

    <div class="actions">
      <button (click)="guardar()" class="btn primary">
        {{ editMode ? 'Actualizar (PUT)' : 'Crear (POST)' }}
      </button>
      <button *ngIf="editMode" (click)="cancelar()" class="btn secondary">
        Cancelar
      </button>
    </div>
  </div>

  <hr />

  <div class="list" *ngIf="posts().length > 0; else noPosts">
    <div class="post" *ngFor="let post of posts()">
      <h3>{{ post.title }}</h3>
      <p>{{ post.content }}</p>
      <div class="actions">
        <button (click)="editar(post)" class="btn edit">Editar</button>
        <button (click)="eliminar(post._id)" class="btn delete">Eliminar</button>
      </div>
    </div>
  </div>

  <ng-template #noPosts>
    <p class="empty">No hay registros aún. Crea uno arriba.</p>
  </ng-template>
</div>
